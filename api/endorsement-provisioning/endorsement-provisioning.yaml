openapi: '3.0.0'

info:
  title: Attestation endorsement provisioning and management
  description: API to provision and manage endorsements. For further details, see datatracker.ietf.org/doc/draft-ietf-rats-corim/
  version: '1.0.0alpha'
servers:
  - url: 'https://veraison.example/endorsement-provisioning/v1'
paths:
  /submit:
    post:
      description: >
        Submit a CoRIM payload containing the endorsements to be provisioned
      requestBody:
        required: true
        content:
          application/rim+cbor:
            schema:
              type : string
              format: binary
              description: >
                a CBOR-encoded CoRIM
      responses:
        '200':
          description: >
            The supplied CoRIM has been successfully provisioned in
            the Verifier. The transaction is complete.
          content:
            application/vnd.veraison.provisioning-session+json:
              schema:
                $ref: './schemas/components.yaml#/components/schemas/SessionResource'
        '201':
          description: >
            The submission is successful and will be processed
            asynchronously. A new session resource is created and its URL is returned in the
            Location header.  The resource will be kept alive for the specified
            time-to-live.
          headers:
            Location:
              schema:
                type: string
                format: uri
              description:
                URL of the newly created session resource to be used in
                subsequent status check. (The current content of the
                resource is returned in the response body.)
          content:
            application/vnd.veraison.provisioning-session+json:
              schema:
                $ref: './schemas/components.yaml#/components/schemas/SessionResource'
        default:
          $ref: './schemas/components.yaml#/components/responses/Error'
  /submissions/{SessionID}:
    get:
      description: >
        retrieve the endorsement provisioning session resource
      parameters:
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: >
            The endorsement provisioning session resource
          content:
            application/vnd.veraison.provisioning-session+json:
              schema:
                $ref: './schemas/components.yaml#/components/schemas/SessionResource'
        default:
          $ref: './schemas/components.yaml#/components/responses/Error'
  /activate:
    post:
      summary: Activate triples matching an endorsement lifecycle mgmt (ELM) query
      description: >
        Activates triples selected by a CBOR-encoded ELM query.
        Operation is idempotent and atomic i.e., if any requested 
        activation fails, no changes are applied.
      operationId: activateEndorsements
      requestBody:
        required: true
        content:
          application/vnd.veraison.elm-v1+cbor:
            schema:
              $ref: './schemas/components.yaml#/components/schemas/ELMQuery'
      responses:
        '204':
          description: Activation successful
        '404':
          description: No matching endorsements found
          content:
            application/concise-problem-details+cbor:
              schema:
                $ref: './schemas/components.yaml#/components/schemas/ConciseProblem'
        default:
          $ref: './schemas/components.yaml#/components/responses/ConciseError'

  /deactivate:
    post:
      summary: Deactivate triples matching an ELM query
      description: >
        Deactivates triples selected by a CBOR-encoded ELM query.
        Operation is idempotent and atomic i.e., if any requested 
        deactivation fails, no changes are applied.
      operationId: deactivateEndorsements
      requestBody:
        required: true
        content:
          application/vnd.veraison.elm-v1+cbor:
            schema:
              $ref: './schemas/components.yaml#/components/schemas/ELMQuery'
      responses:
        '204':
          description: Deactivation successful
        '404':
          description: No matching endorsements found
          content:
            application/concise-problem-details+cbor:
              schema:
                $ref: './schemas/components.yaml#/components/schemas/ConciseProblem'
        default:
          $ref: './schemas/components.yaml#/components/responses/ConciseError'
components:
  parameters:
    SessionID:
      name: SessionID
      in: path
      required: true
      schema:
        type: string
        description:
          A session identifier for polling the status of submission.
